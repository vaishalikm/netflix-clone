{% extends "base.html" %}
{% block title %}Sign Up — FlixStream{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center py-5" style="min-height:100vh;background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1920&h=1080&fit=crop') center/cover no-repeat fixed;">
  <div class="auth-card card bg-dark-glass border-0 shadow-lg p-4 p-md-5 rounded-3" style="width:100%;max-width:440px;margin:80px auto;">

    <div class="text-center mb-4">
      <span class="brand-logo fs-1 d-block mb-2">FlixStream</span>
      <h2 class="text-white fw-bold">Create Account</h2>
      <p class="text-muted">Start watching unlimited movies today.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.signup') }}" novalidate>
      <div class="mb-3">
        <input type="text" class="form-control form-control-lg bg-dark border-secondary text-white auth-input"
               name="username" placeholder="Username"
               value="{{ request.form.get('username', '') }}" required autofocus minlength="3" />
      </div>
      <div class="mb-3">
        <input type="email" class="form-control form-control-lg bg-dark border-secondary text-white auth-input"
               name="email" placeholder="Email address"
               value="{{ request.form.get('email', '') }}" required />
      </div>
      <div class="mb-3">
        <div class="input-group">
          <input type="password" class="form-control form-control-lg bg-dark border-secondary text-white auth-input"
                 name="password" id="passwordField" placeholder="Password (min. 6 chars)" required minlength="6" />
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordField', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <input type="password" class="form-control form-control-lg bg-dark border-secondary text-white auth-input"
               name="confirm_password" placeholder="Confirm password" required />
      </div>
      <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold">Create Account</button>
    </form>

    <div class="text-center mt-4">
      <span class="text-muted">Already have an account?</span>
      <a href="{{ url_for('auth.login') }}" class="text-white fw-bold ms-1 text-decoration-none">Sign in.</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}
